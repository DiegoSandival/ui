<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Graph Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../list-widget-lab/list-widget.css" />
    <link rel="stylesheet" href="./paper-graph.css" />
  </head>
  <body>
    <div class="toolbar" aria-label="Acciones del laboratorio de papeles">
      <button class="toolbar-button" type="button" data-command="new-paper">Nuevo papel</button>
      <button class="toolbar-button" type="button" data-command="touch-selected">Tocar seleccionado</button>
      <button class="toolbar-button" type="button" data-command="make-assembly">Usar como ensamblador</button>
      <button class="toolbar-button" type="button" data-command="reset-demo">Reset demo</button>
    </div>

    <main id="stage" class="stage" aria-label="Canvas de papeles"></main>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

    <script src="./script.js"></script>
  </body>
</html>
