    <script>
        function createFunction(functionString) {
            const n = functionString.trim(),
                t = [
                    /^async\s*\(([^)]*)\)\s*=>\s*\{([\s\S]*)\}$/,
                    /^async\s*\(([^)]*)\)\s*=>\s*([^{].*)$/,
                    /^async\s+function[^(]*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^async\s+function\s*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^\(([^)]*)\)\s*=>\s*\{([\s\S]*)\}$/,
                    /^\(([^)]*)\)\s*=>\s*([^{].*)$/,
                    /^function[^(]*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^function\s*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                ];
            for (const s of t) {
                const t = n.match(s);
                if (t) {
                    const n = t[1]
                        .split(",")
                        .map((n) => n.trim())
                        .filter((n) => n);
                    let i = t[2];
                    const c = s.toString().includes("async");
                    (!s.toString().includes("=>[^{]") &&
                        !s.toString().includes("async.*=>[^{]")) ||
                        i.trim().startsWith("return") ||
                        (i = `return ${i}`);
                    let r = null;
                    if (c) {
                        const t = `\n        return (async function(${n.join(
                            ", "
                        )}) {\n            ${i}\n        }).apply(this, arguments);\n    `;
                        r = new Function(...n, t);
                    } else r = new Function(...n, i);
                    const o = (...n) => r.apply(this, n);
                    return (
                        Object.defineProperty(o, "toString", {
                            value: () => functionString.trim(),
                            writable: !1,
                            configurable: !0,
                        }),
                        o
                    );
                }
            }
            throw new Error(`No se pudo parsear la función: ${functionString}`);
        }
    </script>

    <script>
        class DiarsabaServer {
            constructor() {
                this.textDecoder = new TextDecoder("utf-8");
                this.textEncoder = new TextEncoder();
                this.baseUrl = window.location.origin;
            }

            defineSecret(newSecret) {
                this.secret = newSecret;
            }

            async updateSecret(newSecret) {
                const response = await fetch(this.baseUrl, {
                    "Content-Type": "application/json",
                    method: "PUT",
                    headers: {
                        "X-Secrete": this.secret,
                        "X-New-Secret": newSecret,
                    },
                });

                const buffer = await response.arrayBuffer();
                return this.decodeResult(new Uint8Array(buffer));
            }

            decodeText(data) {
                return this.textDecoder.decode(data);
            }

            encodeText(text) {
                return this.textEncoder.encode(text);
            }

            // Operaciones simplificadas (una por petición)
            async writeDB(index, data, id) {
                const encoded = this.encodeWriteDB(index, data, id);
                return await this.send(encoded, "WRITE_DB");
            }

            async readDB(index, size, id) {
                const encoded = this.encodeReadDB(index, size, id);
                return await this.send(encoded, "READ_DB");
            }

            async writeRam(key, value, id) {
                const encoded = this.encodeWriteRam(key, value, id);
                return await this.send(encoded, "WRITE_RAM");
            }

            async readRam(key, id) {
                const encoded = this.encodeReadRam(key, id);
                return await this.send(encoded, "READ_RAM");
            }

            async freeRam(key, id) {
                const encoded = this.encodeReadRam(key, id); // Misma estructura que readRam
                return await this.send(encoded, "FREE_RAM");
            }

            async send(data, action) {
                const response = await fetch(this.baseUrl, {
                    method: "POST",
                    headers: {
                        "X-Secrete": this.secret,
                        "X-Action": action,
                    },
                    body: data,
                });

                const buffer = await response.arrayBuffer();
                return this.decodeResult(new Uint8Array(buffer));
            }

            // Codificadores simplificados
            encodeWriteDB(index, data, id) {
                const totalSize = 4 + 4 + data.length + 4; // index + size + data + id
                const buffer = new ArrayBuffer(totalSize);
                const view = new DataView(buffer);
                const uint8Array = new Uint8Array(buffer);

                let offset = 0;

                view.setUint32(offset, index, false);
                offset += 4;

                view.setUint32(offset, data.length, false);
                offset += 4;

                uint8Array.set(data, offset);
                offset += data.length;

                view.setUint32(offset, id, false);

                return uint8Array;
            }

            encodeReadDB(index, size, id) {
                const buffer = new ArrayBuffer(12);
                const view = new DataView(buffer);

                view.setUint32(0, index, false);
                view.setUint32(4, size, false);
                view.setUint32(8, id, false);

                return new Uint8Array(buffer);
            }

            encodeWriteRam(key, value, id) {
                const keyBytes = this.encodeText(key);
                const valueBytes = this.encodeText(value);

                const totalSize = 4 + keyBytes.length + 4 + valueBytes.length + 4;
                const buffer = new ArrayBuffer(totalSize);
                const view = new DataView(buffer);
                const uint8Array = new Uint8Array(buffer);

                let offset = 0;

                // Key
                view.setUint32(offset, keyBytes.length, false);
                offset += 4;
                uint8Array.set(keyBytes, offset);
                offset += keyBytes.length;

                // Value
                view.setUint32(offset, valueBytes.length, false);
                offset += 4;
                uint8Array.set(valueBytes, offset);
                offset += valueBytes.length;

                // ID
                view.setUint32(offset, id, false);

                return uint8Array;
            }

            encodeReadRam(key, id) {
                const keyBytes = this.encodeText(key);
                const totalSize = 4 + keyBytes.length + 4;
                const buffer = new ArrayBuffer(totalSize);
                const view = new DataView(buffer);
                const uint8Array = new Uint8Array(buffer);

                let offset = 0;

                view.setUint32(offset, keyBytes.length, false);
                offset += 4;
                uint8Array.set(keyBytes, offset);
                offset += keyBytes.length;

                view.setUint32(offset, id, false);

                return uint8Array;
            }

            decodeResult(data) {
                const view = new DataView(data.buffer);
                let offset = 0;

                const statusCode = view.getUint32(offset, false);
                offset += 4;

                const id = view.getUint32(offset, false);
                offset += 4;

                const size = view.getUint32(offset, false);
                offset += 4;

                const resultado = new Uint8Array(data.buffer, offset, size);

                return { statusCode, id, resultado };
            }
        }
    </script>

    <script>
        class indexDB {
            constructor(dbName, storeName, version = 1) {
                this.dbName = dbName;
                this.storeName = storeName;
                this.version = version;
                this.db = null;
                this.init = this.openDB(); // Inicia la apertura
            }

            async openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, this.version);
                    req.onerror = () => reject(req.error);
                    req.onsuccess = () => {
                        this.db = req.result;
                        resolve(this.db);
                    };
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName);
                        }
                    };
                });
            }

            async get(key) {
                try {
                    await this.init; // Espera a que la DB esté lista
                    return new Promise((resolve, reject) => {
                        const req = this.db
                            .transaction([this.storeName], 'readonly')
                            .objectStore(this.storeName)
                            .get(key);
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(req.result);
                    });
                } catch (e) {
                    console.error('Error en get:', e);
                    return null;
                }
            }

            async set(key, value) {
                try {
                    await this.init; // Espera a que la DB esté lista
                    return new Promise((resolve, reject) => {
                        const req = this.db
                            .transaction([this.storeName], 'readwrite')
                            .objectStore(this.storeName)
                            .put(value, key);
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(req.result);
                    });
                } catch (e) {
                    console.error('Error en set:', e);
                    throw e;
                }
            }

            async delete(key) {
                try {
                    await this.init; // Espera a que la DB esté lista
                    return new Promise((resolve, reject) => {
                        const req = this.db
                            .transaction([this.storeName], 'readwrite')
                            .objectStore(this.storeName)
                            .delete(key);
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(true);
                    });
                } catch (e) {
                    console.error('Error en delete:', e);
                    return false;
                }
            }

            async getAllKeys() {
                try {
                    await this.init; // Espera a que la DB esté lista
                    return new Promise((resolve, reject) => {
                        const req = this.db
                            .transaction([this.storeName], 'readonly')
                            .objectStore(this.storeName)
                            .getAllKeys();
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(req.result);
                    });
                } catch (e) {
                    console.error('Error en getAllKeys:', e);
                    return [];
                }
            }

            async clear() {
                try {
                    await this.init; // Espera a que la DB esté lista
                    return new Promise((resolve, reject) => {
                        const req = this.db
                            .transaction([this.storeName], 'readwrite')
                            .objectStore(this.storeName)
                            .clear();
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(true);
                    });
                } catch (e) {
                    console.error('Error en clear:', e);
                    return false;
                }
            }
        }
    </script>

    <script>
        // Configurar Monaco
        require.config({
            paths: { vs: "https://unpkg.com/monaco-editor@0.49.0/min/vs" },
        });

        // Usar un worker remoto
        window.MonacoEnvironment = {
            getWorkerUrl: function (workerId, label) {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                self.MonacoEnvironment = {
                    baseUrl: 'https://unpkg.com/monaco-editor@0.49.0/min/'
                };
                importScripts('https://unpkg.com/monaco-editor@0.49.0/min/vs/base/worker/workerMain.js');
            `)}`;
            },
        };

        // Clase para gestionar el editor
        class CodeEditor {
            constructor() {
                this.isMonacoLoaded = false;
                this.loadMonaco();

                // Definir los lenguajes disponibles
                this.languages = [
                    { id: 'html', name: 'HTML', icon: 'fab fa-html5', color: '#e34f26' },
                    { id: 'javascript', name: 'JavaScript', icon: 'fab fa-js-square', color: '#f7df1e' },
                    { id: 'css', name: 'CSS', icon: 'fab fa-css3-alt', color: '#1572b6' },
                    { id: 'python', name: 'Python', icon: 'fab fa-python', color: '#3776ab' },
                    { id: 'go', name: 'Go', icon: 'fab fa-golang', color: '#00add8' },
                    { id: 'plaintext', name: 'Texto', icon: 'fas fa-file-alt', color: '#666666' }
                ];

                // Mapeo de idiomas de Monaco
                this.languageMap = {
                    'html': 'html',
                    'javascript': 'javascript',
                    'css': 'css',
                    'python': 'python',
                    'go': 'go',
                    'text': 'plaintext'
                };
            }

            loadMonaco() {
                if (window.monaco) {
                    this.isMonacoLoaded = true;
                    return Promise.resolve();
                }

                return new Promise((resolve, reject) => {
                    require(["vs/editor/editor.main"], () => {
                        this.isMonacoLoaded = true;
                        resolve();
                    }, reject);
                });
            }

            async open(title = "Editor de Código", code = "", language = "javascript") {
                // Esperar a que Monaco esté cargado
                if (!this.isMonacoLoaded) {
                    await this.loadMonaco();
                }

                return new Promise((resolve) => {
                    // Encontrar el lenguaje inicial
                    const initialLang = this.languages.find(lang =>
                        this.languageMap[lang.id] === language || lang.id === language
                    ) || this.languages[1]; // Por defecto JavaScript

                    // Overlay y estructura principal
                    const overlay = Object.assign(document.createElement("div"), {
                        className: "editor-overlay",
                        innerHTML: `
        <div class="editor-modal">
            <div class="editor-header">
                <div class="editor-title">
                    <div class="language-selector">
                        <button class="language-button" type="button" title="Seleccionar lenguaje">
                            <i class="${initialLang.icon}" style="color: ${initialLang.color};"></i>
                            <span class="language-name">${initialLang.name}</span>
                        </button>
                        <div class="language-dropdown">
                            ${this.languages.map(lang => `
                                <button class="dropdown-item" data-lang="${lang.id}">
                                    <i class="${lang.icon}" style="color: ${lang.color};"></i>
                                    <span>${lang.name}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    <span class="modal-title">${title}</span>
                </div>
                <div class="editor-controls">
                    <button class="save-button" title="Guardar (Ctrl+S)">
                        <i class="fas fa-save"></i>
                    </button>
                    <button class="close-button" title="Cerrar">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <div id="monaco-container" style="width:100%;height:100%;"></div>
        </div>
    `,
                    });


                    document.body.appendChild(overlay);

                    // Variables para manejar el estado
                    let currentLanguage = initialLang.id;
                    let editorInstance = null;

                    // Crear editor
                    const createEditor = (langId) => {
                        const monacoLang = this.languageMap[langId] || langId;

                        if (editorInstance) {
                            editorInstance.dispose();
                        }

                        editorInstance = monaco.editor.create(
                            document.getElementById("monaco-container"),
                            {
                                value: code,
                                language: monacoLang,
                                theme: "vs-dark",
                                automaticLayout: true,
                                fontSize: 14,
                                fontFamily: "Fira Code, Consolas, monospace",
                                scrollBeyondLastLine: false,
                                minimap: { enabled: false },
                                lineNumbers: "on",
                                roundedSelection: false,
                                scrollbars: {
                                    vertical: "auto",
                                    horizontal: "auto",
                                },
                            }
                        );

                        return editorInstance;
                    };

                    // Inicializar editor
                    const editor = createEditor(currentLanguage);

                    // Referencias a elementos del DOM
                    const languageButton = overlay.querySelector('.language-button');
                    const languageIcon = languageButton.querySelector('i:first-child');
                    const languageName = languageButton.querySelector('.language-name');
                    const dropdown = overlay.querySelector('.language-dropdown');
                    const dropdownItems = overlay.querySelectorAll('.dropdown-item');

                    // Función para cambiar el lenguaje
                    const changeLanguage = (langId) => {
                        const newLang = this.languages.find(l => l.id === langId);
                        if (!newLang || currentLanguage === langId) return;

                        // Actualizar botón
                        languageIcon.className = newLang.icon;
                        languageIcon.style.color = newLang.color;
                        languageName.textContent = newLang.name;

                        // Actualizar lenguaje en el editor
                        const monacoLang = this.languageMap[langId] || langId;
                        monaco.editor.setModelLanguage(editor.getModel(), monacoLang);

                        currentLanguage = langId;
                        dropdown.classList.remove('show');
                    };

                    // Eventos
                    overlay
                        .querySelector(".save-button")
                        .addEventListener("click", () => closeEditor(editor.getValue()));

                    overlay
                        .querySelector(".close-button")
                        .addEventListener("click", () => closeEditor(""));

                    // Abrir/cerrar dropdown
                    languageButton.addEventListener('click', (e) => {
                        e.stopPropagation();
                        dropdown.classList.toggle('show');
                    });

                    // Seleccionar lenguaje del dropdown
                    dropdownItems.forEach(item => {
                        item.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const langId = item.dataset.lang;
                            changeLanguage(langId);
                        });
                    });

                    // Cerrar dropdown al hacer clic fuera
                    document.addEventListener('click', (e) => {
                        if (!languageButton.contains(e.target) && !dropdown.contains(e.target)) {
                            dropdown.classList.remove('show');
                        }
                    });

                    // Cerrar dropdown con Escape
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && dropdown.classList.contains('show')) {
                            dropdown.classList.remove('show');
                        }
                    });

                    // Función para cerrar el editor y resolver la promesa
                    const closeEditor = (result) => {
                        overlay.remove();

                        editor.dispose();
                        resolve(result);
                    };

                    // Atajos de teclado
                    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
                        const newCode = editor.getValue();
                        closeEditor(newCode);
                    });

                    // Cerrar con Escape
                    editor.addCommand(monaco.KeyCode.Escape, () => {
                        if (!dropdown.classList.contains('show')) {
                            closeEditor("");
                        }
                    });

                    // Cerrar haciendo clic fuera del modal
                    overlay.addEventListener("click", (e) => {
                        if (e.target === overlay) {
                            closeEditor("");
                        }
                    });

                    editor.focus();
                });
            }
        }

        window.codeEditor = new CodeEditor();

    </script>

                                .join(", ")}]\n  → ${e}\n     → ${s[0]} (NO ENCONTRADO)`.trim();
                        alert(a);
                    }
                } else {
                    const s = `• no exist "${e}"`.trim();
                    alert(s);
                }
            }
        }

                diarsaba.get(dataset.parent).splice(selection.indice + 1, 0, tomado);

                diarsaba.get(`${dataset.parent} # ֎`).remove();
                diarsaba.get("· ~ abrir ƒ")(dataset);
            });

            diarsaba.set("· # antes ƒ", (dataset) => {
                const tomado = diarsaba.get("· * tomar §");
                const selection = diarsaba.get("obtener index [0] ƒ")(dataset.current);
                diarsaba.get(dataset.parent).splice(selection.indice, 0, tomado);

                diarsaba.get(`${dataset.parent} # ֎`).remove();
                diarsaba.get("· ~ abrir ƒ")(dataset);
            });
            diarsaba.set("· # eliminar ƒ", (dataset) => {
                const selection = diarsaba.get("obtener index [0] ƒ")(dataset.current);
                diarsaba.get(dataset.parent).splice(selection.indice, 1);

                diarsaba.get(`${dataset.parent} # ֎`).remove();
                diarsaba.get("· ~ abrir ƒ")(dataset);
            });

            diarsaba.set("· * eliminar ƒ", (dataset) => {
                diarsaba.get(`${dataset.parent} # ֎`).remove();
                diarsaba.get(`${dataset.parent} ֎`).remove();
                diarsaba.delete(dataset.parent);
                diarsaba.delete(`${dataset.parent} ֎`);
                diarsaba.delete(`${dataset.parent} # ֎`);
            });

            diarsaba.set("obtener index [0] ƒ", (texto) => {
                const regex = /^\[(\d+)\]\s*(.*)$/;
                const match = texto.match(regex);

                if (!match) {
                    throw new Error('Formato inválido. Se esperaba: "[número] texto"');
                }

                return {
                    indice: parseInt(match[1], 10),
                    texto: match[2].trim(),
                };
            });

            diarsaba.set("· * tomar ƒ", (dataset) => {
                diarsaba.set("· * tomar §", dataset.parent);
            });

            diarsaba.set("· ~ abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const l_div = diarsaba.get("create list ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent
                );

                if (diarsaba.get(`${dataset.parent} # ֎`)) {
                    diarsaba.get(`${dataset.parent} # ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} # ֎`, l_div);
            });
            //~ ƒ ! $ § #
            diarsaba.set("· $ abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const chip = diarsaba.get("create chip ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent,
                    "$"
                );

                if (diarsaba.get(`${dataset.parent} ֎ ֎`)) {
                    diarsaba.get(`${dataset.parent} ֎ ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} ֎ ֎`, chip);
            });
            diarsaba.set("· § abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const chip = diarsaba.get("create chip ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent,
                    "§"
                );

                if (diarsaba.get(`${dataset.parent} ֎ ֎`)) {
                    diarsaba.get(`${dataset.parent} ֎ ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} ֎ ֎`, chip);
            });
            diarsaba.set("· # abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const l_div = diarsaba.get("create list ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent
                );

                if (diarsaba.get(`${dataset.parent} # ֎`)) {
                    diarsaba.get(`${dataset.parent} # ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} # ֎`, l_div);
            });
            diarsaba.set("· ƒ abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const chip = diarsaba.get("create chip ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent,
                    "ƒ"
                );

                if (diarsaba.get(`${dataset.parent} ֎ ֎`)) {
                    diarsaba.get(`${dataset.parent} ֎ ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} ֎ ֎`, chip);
            });
            diarsaba.set("· ! abrir ƒ", (dataset) => {
                const rect = diarsaba.get(`${dataset.parent} ֎`).getBoundingClientRect();
                const l_div = diarsaba.get("create list ƒ")(
                    rect.left + rect.width + 10,
                    rect.top,
                    diarsaba.get(dataset.parent),
                    dataset.parent
                );

                if (diarsaba.get(`${dataset.parent} # ֎`)) {
                    diarsaba.get(`${dataset.parent} # ֎`).remove();
                }

                diarsaba.set(`${dataset.parent} # ֎`, l_div);
            });

            diarsaba.set("· * ocultar ƒ", (dataset) => {
                const chip = diarsaba.get(`${dataset.parent} ֎`);
                if (chip) {
                    diarsaba.get(`${dataset.parent} ֎`).remove();
                    diarsaba.delete(`${dataset.parent} ֎`);
                } else {
                    diarsaba.get(`${dataset.parent} ֎ ֎`).remove();
                    diarsaba.delete(`${dataset.parent} ֎ ֎`);
                }
            });

            diarsaba.set("· ֎* ocultar ƒ", (dataset) => {
                diarsaba.get(`${dataset.parent} ֎ ֎`).remove();
                diarsaba.delete(`${dataset.parent} ֎ ֎`);
            });

            diarsaba.set("eliminar elemento del dom ƒ", (dataset) => {
                diarsaba.get(`${dataset.parent} ֎`).remove();
            });

            diarsaba.set("create ~ thread ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, []);
            });
            diarsaba.set("create ƒ func ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, null);
            });
            diarsaba.set("create ! action ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, []);
            });
            diarsaba.set("create $ num ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, 0);
            });
            diarsaba.set("create § text ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, "");
            });

            diarsaba.set("create # list ƒ", (name) => {
                if (!diarsaba.get(`${name}`)) diarsaba.set(`${name}`, []);
            });

            diarsaba.set("clear menus ƒ", () => {
                if (diarsaba.get("current menu")) {
                    diarsaba.get("current menu").remove();
                }

                if (diarsaba.get("current chip menu")) {
                    diarsaba.get("current chip menu").remove();
                }
            });

            diarsaba.set("modal input ƒ", async (pre) => {
                const createEl = (tag, props = {}) =>
                    Object.assign(document.createElement(tag), props);

                const div = createEl("div", { className: "modal-content" });
                const input = createEl("input", {
                    type: "text",
                    value: pre || "",
                    spellcheck: false,
                });

                const buttonContainer = createEl("div", { className: "modal-buttons" });

                ["Cancel", "Continue"].forEach((text) => {
                    const btn = createEl("button", { textContent: text });
                    btn.dataset.modal = text.toLowerCase();
                    btn.onclick = () => {
                        div.remove();
                        this.nombreInputPromise?.(
                            text === "Cancel" ? null : input.value.trim()
                        );
                    };
                    buttonContainer.append(btn);
                });

                div.append(input, buttonContainer);
                document.body.append(div);
                input.focus();

                return await new Promise((resolve) => (this.nombreInputPromise = resolve));
            });

            diarsaba.set("create list ƒ", (x, y, list, parent) => {
                const div = document.createElement("div");
                div.classList = "context-menu";

                if (list.length == 0) {
                    div.innerHTML += `<span class="menu-item">[0]</span>`;
                } else {
                    for (const key in list) {
                        div.innerHTML += `<span class="menu-item">[${key}] ${list[key]}</span>`;
                    }
                }

                div.style.left = `${x}px`;
                div.style.top = `${y}px`;
                div.dataset.parent = parent;
                document.body.appendChild(div);
                return div;
            });

            diarsaba.set("create list menu ƒ", (list, parent = "", current = "") => {
                const div = document.createElement("div");
                div.classList = "context-menu";
                for (const key of list) {
                    div.innerHTML += `<span class="menu-item">${key}</span>`;
                }
                div.style.left = `${diarsaba.get("pointer x")}px`;
                div.style.top = `${diarsaba.get("pointer y")}px`;

                div.dataset.parent = parent;
                div.dataset.current = current;
                document.body.appendChild(div);
                return div;
            });

            diarsaba.set("create chip ƒ", (x, y, text, parent = "", type = "") => {
                const div = document.createElement("div");
                div.classList = "object-name";
                div.textContent = text;
                div.style.left = `${x}px`;
                div.style.top = `${y}px`;
                div.spellcheck = false;
                div.dataset.parent = parent;
                div.dataset.type = type;
                document.body.appendChild(div);
                return div;
            });

            diarsaba.get("on start")();
        });
    </script>
